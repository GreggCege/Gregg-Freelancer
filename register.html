<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Vault - Registro</title>
    <link rel="stylesheet" href="style2.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #050505;
            padding-top: 80px;
        }

        .auth-box {
            background: #0d0d0d;
            padding: 40px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .auth-box h2 {
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #8f8f8f;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            border-radius: 8px;
            font-size: 16px;
        }

        .input-group input:focus {
            outline: none;
            border-color: #666;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 36px;
            background: none;
            border: none;
            color: #8f8f8f;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 40px;
            width: 40px;
        }

        .toggle-password:hover {
            color: white;
        }

        /* ... existing auth-btn styles ... */
        .auth-btn {
            width: 100%;
            padding: 14px;
            background: white;
            color: black;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: .3s;
        }

        .auth-btn:hover {
            background: #ccc;
        }

        .auth-links {
            margin-top: 20px;
            font-size: 14px;
            color: #a3a3a3;
        }

        .auth-links a {
            color: white;
            text-decoration: none;
        }

        .auth-links a:hover {
            text-decoration: underline;
        }

        .error-message {
            color: #ff4d4d;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }
    </style>
    <link rel="icon" type="image/png" href="favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="favicon/favicon.svg" />
    <link rel="shortcut icon" href="favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="TheVaultNow" />
    <link rel="manifest" href="favicon/site.webmanifest" />
</head>

<body>

    <header>
        <div class="logo" onclick="window.location.href='index.html'">
            THE VAULT
        </div>
    </header>

    <div class="auth-container">
        <div class="auth-box">
            <h2>CREATE ACCOUNT</h2>
            <form id="register-form">
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="reg-username" required>
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="reg-email" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="reg-password" required minlength="6">
                    <button type="button" class="toggle-password" onclick="toggleVisibility('reg-password')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                <p class="error-message" id="reg-error-msg">Error registering.</p>
                <button type="submit" class="auth-btn">REGISTER</button>
            </form>
            <div class="auth-links">
                <p>Already have an account? <a href="login.html">Log in</a></p>
            </div>
        </div>
    </div>

    <script type="module" src="auth.js"></script>
    <script>
        function toggleVisibility(inputId) {
            const input = document.getElementById(inputId);
            const icon = input.nextElementSibling.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
    </script>
</body>

</html>
